version: '3.8'

services:
  web:
    build: .
    container_name: formation-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/formationsdb
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: formation-db
    restart: always
    environment:
      POSTGRES_DB: formationsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: